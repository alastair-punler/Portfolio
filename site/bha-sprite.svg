<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 156" shape-rendering="crispEdges">
  <defs>
    <linearGradient id="steel" x1="0" y1="0" x2="16" y2="0" gradientUnits="userSpaceOnUse" spreadMethod="repeat">
      <stop offset="0%" stop-color="#5a5a5a"/>
      <stop offset="30%" stop-color="#999"/>
      <stop offset="50%" stop-color="#bbb"/>
      <stop offset="70%" stop-color="#999"/>
      <stop offset="100%" stop-color="#5a5a5a"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="0 0" to="16 0" dur="1s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="rss-body" x1="0" y1="0" x2="16" y2="0" gradientUnits="userSpaceOnUse" spreadMethod="repeat">
      <stop offset="0%" stop-color="#7a1a10"/>
      <stop offset="20%" stop-color="#bb2d1a"/>
      <stop offset="50%" stop-color="#dd4430"/>
      <stop offset="80%" stop-color="#bb2d1a"/>
      <stop offset="100%" stop-color="#7a1a10"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="0 0" to="16 0" dur="1s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="bit-body" x1="0" y1="0" x2="16" y2="0" gradientUnits="userSpaceOnUse" spreadMethod="repeat">
      <stop offset="0%" stop-color="#8a7a5a"/>
      <stop offset="25%" stop-color="#b8a878"/>
      <stop offset="50%" stop-color="#d4c498"/>
      <stop offset="75%" stop-color="#b8a878"/>
      <stop offset="100%" stop-color="#8a7a5a"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="0 0" to="16 0" dur="1s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="bit-pin" x1="0" y1="0" x2="16" y2="0" gradientUnits="userSpaceOnUse" spreadMethod="repeat">
      <stop offset="0%" stop-color="#4a4a3a"/>
      <stop offset="30%" stop-color="#6a6a55"/>
      <stop offset="50%" stop-color="#7a7a65"/>
      <stop offset="70%" stop-color="#6a6a55"/>
      <stop offset="100%" stop-color="#4a4a3a"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="0 0" to="16 0" dur="1s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>

  <!-- ════════ CROSSOVER SUB ════════ -->
  <rect x="19" y="0" width="10" height="2" fill="#aaa"/>
  <rect x="18" y="2" width="12" height="2" fill="#ccc"/>
  <rect x="19" y="4" width="10" height="2" fill="#aaa"/>
  <rect x="20" y="6" width="8" height="4" fill="url(#steel)"/>

  <!-- ════════ UPPER STABILISER (spiral blades on body) ════════ -->
  <rect x="18" y="10" width="12" height="2" fill="#999"/>
  <!-- Main body -->
  <rect x="17" y="12" width="14" height="28" fill="url(#steel)"/>
  <rect x="16" y="12" width="1" height="28" fill="#4a4a4a"/>
  <rect x="31" y="12" width="1" height="28" fill="#4a4a4a"/>
  <!-- Spiral blade wraps (on the body surface, teal) -->
  <rect x="16" y="13" width="4" height="2" fill="#2a9a85"/>
  <rect x="20" y="15" width="4" height="2" fill="#23876f"/>
  <rect x="24" y="17" width="4" height="2" fill="#2a9a85"/>
  <rect x="28" y="19" width="3" height="2" fill="#23876f"/>
  <rect x="16" y="22" width="4" height="2" fill="#2a9a85"/>
  <rect x="20" y="24" width="4" height="2" fill="#23876f"/>
  <rect x="24" y="26" width="4" height="2" fill="#2a9a85"/>
  <rect x="28" y="28" width="3" height="2" fill="#23876f"/>
  <rect x="16" y="31" width="4" height="2" fill="#2a9a85"/>
  <rect x="20" y="33" width="4" height="2" fill="#23876f"/>
  <rect x="24" y="35" width="4" height="2" fill="#2a9a85"/>
  <rect x="28" y="37" width="3" height="2" fill="#23876f"/>
  <!-- Band bottom -->
  <rect x="18" y="40" width="12" height="2" fill="#999"/>

  <!-- ════════ DRILL COLLAR / IDS SECTION ════════ -->
  <rect x="19" y="42" width="10" height="28" fill="url(#steel)"/>
  <rect x="18" y="42" width="1" height="28" fill="#4a4a4a"/>
  <rect x="29" y="42" width="1" height="28" fill="#4a4a4a"/>
  <rect x="18" y="42" width="12" height="2" fill="#bbb"/>
  <rect x="18" y="54" width="12" height="2" fill="#bbb"/>
  <rect x="18" y="68" width="12" height="2" fill="#bbb"/>

  <!-- ════════ ROTARY STEERABLE SYSTEM (RSS) ════════ -->
  <rect x="18" y="70" width="12" height="2" fill="#bbb"/>
  <!-- RSS main body -->
  <rect x="16" y="72" width="16" height="48" fill="url(#rss-body)"/>
  <rect x="15" y="72" width="1" height="48" fill="#5a1008"/>
  <rect x="32" y="72" width="1" height="48" fill="#5a1008"/>
  <rect x="15" y="72" width="18" height="2" fill="#661510"/>
  <rect x="15" y="118" width="18" height="2" fill="#661510"/>
  <!-- Rib details -->
  <rect x="16" y="80" width="16" height="1" fill="#992218"/>
  <rect x="16" y="88" width="16" height="1" fill="#992218"/>
  <rect x="16" y="96" width="16" height="1" fill="#992218"/>
  <rect x="16" y="104" width="16" height="1" fill="#992218"/>
  <rect x="16" y="112" width="16" height="1" fill="#992218"/>
  <!-- Centre highlight -->
  <rect x="23" y="74" width="2" height="44" fill="#ee5540" opacity="0.35"/>
  <!-- Steering pads (2 pads, horizontally opposed, same height) -->
  <!-- Pad - left side -->
  <rect x="15" y="92" width="4" height="8" fill="#888"/>
  <rect x="15" y="92" width="4" height="1" fill="#aaa"/>
  <rect x="15" y="99" width="4" height="1" fill="#666"/>
  <rect x="16" y="94" width="2" height="4" fill="#bbb"/>
  <!-- Pad - right side -->
  <rect x="29" y="92" width="4" height="8" fill="#888"/>
  <rect x="29" y="92" width="4" height="1" fill="#aaa"/>
  <rect x="29" y="99" width="4" height="1" fill="#666"/>
  <rect x="30" y="94" width="2" height="4" fill="#bbb"/>

  <!-- ════════ NEAR-BIT STABILISER (pivot stab) ════════ -->
  <rect x="18" y="120" width="12" height="2" fill="#bbb"/>
  <rect x="17" y="122" width="14" height="20" fill="url(#steel)"/>
  <rect x="16" y="122" width="1" height="20" fill="#4a4a4a"/>
  <rect x="31" y="122" width="1" height="20" fill="#4a4a4a"/>
  <!-- Spiral blades on body (red/brown) -->
  <rect x="16" y="124" width="4" height="2" fill="#aa4433"/>
  <rect x="20" y="126" width="4" height="2" fill="#993322"/>
  <rect x="24" y="128" width="4" height="2" fill="#aa4433"/>
  <rect x="28" y="130" width="3" height="2" fill="#993322"/>
  <rect x="16" y="133" width="4" height="2" fill="#aa4433"/>
  <rect x="20" y="135" width="4" height="2" fill="#993322"/>
  <rect x="24" y="137" width="4" height="2" fill="#aa4433"/>
  <rect x="28" y="139" width="3" height="2" fill="#993322"/>
  <rect x="18" y="142" width="12" height="2" fill="#999"/>

  <!-- Bottom band (bit connection) -->
  <rect x="18" y="144" width="12" height="2" fill="#999"/>
  <rect x="19" y="146" width="10" height="6" fill="url(#steel)"/>
  <rect x="18" y="152" width="12" height="2" fill="#999"/>

</svg>
