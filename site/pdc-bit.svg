<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" shape-rendering="crispEdges">
  <!-- PDC Bit: top-down view, 5 blades, 8-bit pixel art -->

  <!-- Gauge ring (outer circle - dark border) -->
  <rect x="14" y="2"  width="20" height="2" fill="#7a6a4a"/>
  <rect x="10" y="4"  width="4"  height="2" fill="#7a6a4a"/>
  <rect x="34" y="4"  width="4"  height="2" fill="#7a6a4a"/>
  <rect x="8"  y="6"  width="2"  height="2" fill="#7a6a4a"/>
  <rect x="38" y="6"  width="2"  height="2" fill="#7a6a4a"/>
  <rect x="6"  y="8"  width="2"  height="4" fill="#7a6a4a"/>
  <rect x="40" y="8"  width="2"  height="4" fill="#7a6a4a"/>
  <rect x="4"  y="12" width="2"  height="4" fill="#7a6a4a"/>
  <rect x="42" y="12" width="2"  height="4" fill="#7a6a4a"/>
  <rect x="2"  y="16" width="2"  height="16" fill="#7a6a4a"/>
  <rect x="44" y="16" width="2"  height="16" fill="#7a6a4a"/>
  <rect x="4"  y="32" width="2"  height="4" fill="#7a6a4a"/>
  <rect x="42" y="32" width="2"  height="4" fill="#7a6a4a"/>
  <rect x="6"  y="36" width="2"  height="4" fill="#7a6a4a"/>
  <rect x="40" y="36" width="2"  height="4" fill="#7a6a4a"/>
  <rect x="8"  y="40" width="2"  height="2" fill="#7a6a4a"/>
  <rect x="38" y="40" width="2"  height="2" fill="#7a6a4a"/>
  <rect x="10" y="42" width="4"  height="2" fill="#7a6a4a"/>
  <rect x="34" y="42" width="4"  height="2" fill="#7a6a4a"/>
  <rect x="14" y="44" width="20" height="2" fill="#7a6a4a"/>

  <!-- Bit body fill (tan/khaki) -->
  <rect x="14" y="4"  width="20" height="2" fill="#c4b488"/>
  <rect x="10" y="6"  width="28" height="2" fill="#c4b488"/>
  <rect x="8"  y="8"  width="32" height="4" fill="#c4b488"/>
  <rect x="6"  y="12" width="36" height="4" fill="#c4b488"/>
  <rect x="4"  y="16" width="40" height="16" fill="#c4b488"/>
  <rect x="6"  y="32" width="36" height="4" fill="#c4b488"/>
  <rect x="8"  y="36" width="32" height="4" fill="#c4b488"/>
  <rect x="10" y="40" width="28" height="2" fill="#c4b488"/>
  <rect x="14" y="42" width="20" height="2" fill="#c4b488"/>

  <!-- Junk slots (5 dark channels radiating from centre) -->
  <!-- Slot 1: top -->
  <rect x="22" y="6"  width="4" height="8" fill="#3a3520"/>
  <!-- Slot 2: upper-right -->
  <rect x="30" y="12" width="6" height="4" fill="#3a3520"/>
  <rect x="28" y="14" width="4" height="4" fill="#3a3520"/>
  <!-- Slot 3: lower-right -->
  <rect x="28" y="30" width="4" height="4" fill="#3a3520"/>
  <rect x="30" y="32" width="6" height="4" fill="#3a3520"/>
  <!-- Slot 4: lower-left -->
  <rect x="12" y="30" width="4" height="4" fill="#3a3520"/>
  <rect x="10" y="32" width="6" height="4" fill="#3a3520"/>
  <!-- Slot 5: upper-left -->
  <rect x="10" y="12" width="6" height="4" fill="#3a3520"/>
  <rect x="12" y="14" width="4" height="4" fill="#3a3520"/>

  <!-- Central bore / nozzle cluster -->
  <rect x="20" y="20" width="8" height="8" fill="#2a2518"/>
  <rect x="22" y="18" width="4" height="2" fill="#2a2518"/>
  <rect x="22" y="28" width="4" height="2" fill="#2a2518"/>
  <rect x="18" y="22" width="2" height="4" fill="#2a2518"/>
  <rect x="28" y="22" width="2" height="4" fill="#2a2518"/>

  <!-- Nozzle ports (3, bright openings) -->
  <rect x="22" y="20" width="2" height="2" fill="#111"/>
  <rect x="24" y="24" width="2" height="2" fill="#111"/>
  <rect x="20" y="24" width="2" height="2" fill="#111"/>

  <!-- PDC cutters (black circles on blade leading edges) -->
  <!-- Blade 1 (top-right) cutters -->
  <rect x="26" y="6"  width="2" height="2" fill="#111"/>
  <rect x="28" y="8"  width="2" height="2" fill="#222"/>
  <rect x="30" y="8"  width="2" height="2" fill="#111"/>
  <rect x="32" y="10" width="2" height="2" fill="#222"/>

  <!-- Blade 2 (right) cutters -->
  <rect x="34" y="18" width="2" height="2" fill="#111"/>
  <rect x="36" y="20" width="2" height="2" fill="#222"/>
  <rect x="36" y="22" width="2" height="2" fill="#111"/>
  <rect x="34" y="26" width="2" height="2" fill="#222"/>

  <!-- Blade 3 (lower-right) cutters -->
  <rect x="30" y="36" width="2" height="2" fill="#111"/>
  <rect x="28" y="38" width="2" height="2" fill="#222"/>
  <rect x="26" y="38" width="2" height="2" fill="#111"/>
  <rect x="24" y="40" width="2" height="2" fill="#222"/>

  <!-- Blade 4 (lower-left) cutters -->
  <rect x="14" y="36" width="2" height="2" fill="#111"/>
  <rect x="12" y="38" width="2" height="2" fill="#222"/>
  <rect x="18" y="38" width="2" height="2" fill="#111"/>
  <rect x="20" y="40" width="2" height="2" fill="#222"/>

  <!-- Blade 5 (left) cutters -->
  <rect x="8"  y="18" width="2" height="2" fill="#222"/>
  <rect x="6"  y="20" width="2" height="2" fill="#111"/>
  <rect x="6"  y="24" width="2" height="2" fill="#222"/>
  <rect x="8"  y="26" width="2" height="2" fill="#111"/>
  <rect x="10" y="28" width="2" height="2" fill="#222"/>

  <!-- Blade surface highlights (lighter patches on blade faces) -->
  <rect x="16" y="8"  width="4" height="2" fill="#d4c498"/>
  <rect x="34" y="16" width="4" height="2" fill="#d4c498"/>
  <rect x="32" y="28" width="4" height="2" fill="#d4c498"/>
  <rect x="10" y="28" width="4" height="2" fill="#d4c498"/>
  <rect x="8"  y="16" width="4" height="2" fill="#d4c498"/>

</svg>
